<!DOCTYPE html>
<html lang='es'><head><meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>
<title>Ayelin ❤️</title>
<style>
body{margin:0;overflow:hidden;background:radial-gradient(circle,#180018,#000);font-family:Arial,sans-serif}
#msg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#fff;text-align:center;width:90%;text-shadow:0 0 15px #ff4da6}
h1{color:#ff4da6}
.heart{position:absolute;animation:float 10s linear infinite}
@keyframes float{from{transform:translateY(100vh)}to{transform:translateY(-100px)}}
</style></head>
<body>
<div id='msg'>
<h1>Ayelin ❤️</h1>
<p>Eres y serás una de las personas que nunca pensé que me lograría enamorar tanto y en tan poco tiempo.</p>
<p><b>Con cariño, Zamir ❤️</b></p>
</div>
<audio id='audio' loop>
<source src='god-you-look-so-pretty.mp3' type='audio/mpeg'>
</audio>
<script>
function heart(){
const h=document.createElement('div');
h.className='heart';
h.innerHTML='❤️';
h.style.left=Math.random()*100+'vw';
h.style.fontSize=(20+Math.random()*30)+'px';
document.body.appendChild(h);
setTimeout(()=>h.remove(),10000);
}
setInterval(heart,150);
document.body.onclick=()=>document.getElementById('audio').play();
</script>
</body></html>
